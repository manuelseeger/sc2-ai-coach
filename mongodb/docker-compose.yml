name: sc2-ai-coach-db

services:
  db:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${DB_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_DATABASE: "${DB_NAME:-SC2AICOACH}"
    volumes:
      - sc2-aicoach-mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  sc2-aicoach-mongo-data: